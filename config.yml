app:
  name: "My App"
  version: "1.0.0"
  description: "My App Description"
  download_url: ""
  support_url: ""

game:
  # offline - disable leaderboard, achievement, and other online features, override `enabled` settings
  # if offline, spin up local server with minimum features
  mode: "offline"
  enabled:
    gamemode:
      # List of enabled game modes
      - "word:classic"       # Classic word game mode
      - "word:blind"         # Blind word game mode
      - "word:time"          # Timed word game mode
      - "word:challenge"     # Challenge word game mode
      - "word:multiplayer"   # Multiplayer word game mode
      - "word:tournament"    # Tournament word game mode
      - "word:practice"      # Practice word game mode
      - "word:speed"         # Speed word game mode
      - "word:marathon"      # Marathon word game mode
      - "word:reverse"       # Reverse word game mode
      - "word:hard"          # Hard word game mode
      - "word:blitz"         # Blitz word game mode
      - "word:relay"         # Relay word game mode
      - "word:infinite"      # Infinite word game mode
      - "sentence:classic"   # Classic sentence game mode
      - "sentence:time"      # Timed sentence game mode
    leaderboard: true        # Enable leaderboard feature
    achievement: true        # Enable achievement feature
    daily_challenge: true    # Enable daily challenge feature
    weekly_challenge: true   # Enable weekly challenge feature
    monthly_challenge: true  # Enable monthly challenge feature
    tournament: true         # Enable tournament feature
    multiplayer: true        # Enable multiplayer feature
    ads: true                # Enable ads feature
    iap: true                # Enable in-app purchases feature
    social: true             # Enable social features
    notification: true       # Enable notifications
    analytics: true          # Enable analytics